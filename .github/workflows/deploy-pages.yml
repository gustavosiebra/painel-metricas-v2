name: Deploy Frontend to GitHub Pages

# Fase 9 — hospedagem gratuita (TEC-007). O frontend é estático (HTML/CSS/JS
# puro, sem build) e consome só a anon key do Supabase, segura para expor
# publicamente (a segurança real é RLS, validada na Fase 8). publica a pasta
# frontend/ direto, sem precisar mover nada de lugar no repositório.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar frontend/
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
