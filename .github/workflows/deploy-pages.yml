name: Deploy Frontend to GitHub Pages

# Fase 9 — hospedagem gratuita (TEC-007). O frontend é estático (HTML/CSS/JS
# puro, sem build) e consome só a anon key do Supabase, segura para expor
# publicamente (a segurança real é RLS, validada na Fase 8). publica a pasta
# frontend/ direto, sem precisar mover nada de lugar no repositório.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "scripts/inject-cache-version.mjs"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Build e Deploy separados em 2 jobs (05/07/2026, depois do erro "Multiple
# artifacts named 'github-pages'... Artifact count is 2"). Motivo: com tudo
# num job só, clicar "Re-run jobs" reexecuta TAMBÉM o upload-pages-artifact —
# e o artefato da tentativa anterior ainda existe, colidindo com o novo e
# quebrando o deploy-pages (que espera exatamente 1 artefato "github-pages"
# por execução). Com build/deploy em jobs distintos, dá pra reexecutar só o
# job "deploy" (que não empacota nada de novo) sem gerar essa colisão.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      # Cache-busting (19/07/2026) — site estático sem bundler, então JS/CSS
      # ficavam em cache no navegador/CDN mesmo depois de um deploy novo
      # (caso real: correção da semana civil não aparecia no celular). Este
      # passo acrescenta "?v=<sha do commit>" em toda tag <link>/<script>
      # local do index.html e em todo import (estático e dinâmico) dos
      # módulos JS, só nesta cópia publicada — o repositório em si nunca é
      # alterado. Ver scripts/inject-cache-version.mjs.
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache-busting dos assets
        run: node scripts/inject-cache-version.mjs "${{ github.sha }}"

      - name: Empacotar frontend/
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
