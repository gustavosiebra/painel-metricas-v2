<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova senha — Painel de Métricas dos Estudos</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div class="centered-page">
    <div class="card card--auth">
      <h1 class="form-title">Definir nova senha</h1>
      <div id="alert-box"></div>
      <form id="reset-form">
        <div class="form-field">
          <label for="password">Nova senha</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="form-field">
          <label for="password-confirm">Confirmar nova senha</label>
          <input type="password" id="password-confirm" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn">Salvar nova senha</button>
      </form>
      <div class="form-links">
        <a href="index.html#/login" class="btn-link">Voltar para o login</a>
      </div>
    </div>
  </div>
  <script type="module" src="js/resetPasswordEntry.js"></script>
</body>
</html>
